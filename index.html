<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MK // Markdown Kanban</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap");

      :root {
        --bg-primary: #f8fafc;
        --bg-card: #ffffff;
        --text-main: #334155;
        --text-dim: #64748b;
        --accent: #6366f1;
        --border: #e2e8f0;
        --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        --radius: 1.5rem;
        --font: "JetBrains Mono", monospace;
      }

      body.dark {
        --bg-primary: #272822;
        --bg-card: #3e3d32;
        --text-main: #f8f8f2;
        --text-dim: #75715e;
        --accent: #f92672;
        --border: #49483e;
        --mk-blue: #66d9ef;
        --mk-yellow: #e6db74;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font);
        background-color: var(--bg-primary);
        color: var(--text-main);
        transition: all 0.3s ease;
        line-height: 1.5;
        padding: 2rem;
      }

      header {
        max-width: 1200px;
        margin: 0 auto 3rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      h1, h2, h3 {
        padding-top: .5rem;
        padding-bottom: .5rem;
      }

      li {
        margin-left: 1rem;
      }

      .logo {
        font-size: 1.25rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .logo-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
      }

      .btn {
        padding: 0.5rem 1rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-main);
        font-family: var(--font);
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
      }

      .column {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .column-header {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 0 1rem;
        opacity: 0.5;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.5rem;
      }

      .card-list {
        min-height: 500px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
        border-radius: var(--radius);
        transition: background 0.2s;
        border: 2px dashed transparent;
      }
      .card-list.drag-over {
        background: rgba(99, 102, 241, 0.05);
        border-color: var(--accent);
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: transform 0.2s;
      }
      .card.conflict {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
      }
      .card.conflict .card-epic {
        color: #ef4444;
      }
      .card-title {
        font-size: 0.9rem;
        font-weight: 500;
        margin-bottom: 1rem;
      }
      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .tag {
        font-size: 0.6rem;
        padding: 0.2rem 0.6rem;
        border-radius: 1rem;
        background: var(--border);
        opacity: 0.8;
      }

      .table-view {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      .table-view th,
      .table-view td {
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        text-align: left;
        font-size: 0.8rem;
      }
      .hidden {
        display: none;
      }

      /* Status Indicator */
      .status {
        font-size: 0.6rem;
        font-weight: 700;
        opacity: 0.4;
        text-transform: uppercase;
      }
      .status.syncing {
        color: var(--accent);
        opacity: 1;
      }
      .status.error {
        color: #ef4444;
        opacity: 1;
      }

      /* Filter */
      .filter-container {
        max-width: 1200px;
        margin: 0 auto 2rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .filter-label {
        font-size: 0.7rem;
        font-weight: 700;
        opacity: 0.5;
        margin-right: 0.5rem;
      }
      .filter-chip {
        font-size: 0.65rem;
        padding: 0.2rem 0.8rem;
        border-radius: 1rem;
        border: 1px solid var(--border);
        background: var(--bg-card);
        cursor: pointer;
        transition: all 0.2s;
        opacity: 0.6;
      }
      .filter-chip.active {
        opacity: 1;
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal {
        background: var(--bg-card);
        width: 90%;
        max-width: 900px;
        height: 85vh;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 1rem;
        background: rgba(0, 0, 0, 0.02);
      }
      .tag-input-container {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--bg-primary);
        padding: 0.25rem 0.75rem;
        border-radius: 2rem;
        border: 1px solid var(--border);
      }
      .tag-input {
        background: transparent;
        border: none;
        color: var(--text-main);
        font-family: var(--font);
        font-size: 0.7rem;
        outline: none;
        width: 80px;
      }
      .modal-tags {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .tag-remove {
        cursor: pointer;
        margin-left: 0.3rem;
        opacity: 0.5;
      }
      .tag-remove:hover {
        opacity: 1;
        color: var(--accent);
      }
      .modal-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .modal-content {
        padding: 0;
        overflow: hidden;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .modal-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        padding: 0 1rem;
        gap: 1rem;
      }
      .modal-tab {
        padding: 0.75rem 1rem;
        font-size: 0.7rem;
        font-weight: 700;
        cursor: pointer;
        opacity: 0.5;
        border-bottom: 2px solid transparent;
      }
      .modal-tab.active {
        opacity: 1;
        border-bottom-color: var(--accent);
      }
      .editor-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        overflow-y: auto;
      }
      #markdown-editor {
        width: 100%;
        height: 100%;
        min-height: 300px;
        background: transparent;
        border: none;
        color: var(--text-main);
        font-family: var(--font);
        font-size: 0.9rem;
        outline: none;
        resize: none;
        line-height: 1.6;
      }
      #modal-body {
        display: none;
        padding: 1.5rem;
        flex: 1;
        overflow-y: auto;
      }
      #modal-body.active {
        display: block;
      }
      .prose h1 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }
      .prose code {
        background: var(--border);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
      }
      .prose p {
        margin-bottom: 1rem;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="dark">
    <header>
      <div>
        <div class="logo">
          <div class="logo-dot"></div>
          mk // kanban
        </div>
        <div id="sync-status" class="status">synced</div>
      </div>
      <div style="display: flex; gap: 1rem">
        <button class="btn" onclick="toggleView()">switch_view()</button>
        <button class="btn" onclick="toggleTheme()">switch_theme()</button>
      </div>
    </header>

    <div
      id="epic-filters"
      class="filter-container"
      style="margin-bottom: 0.5rem"
    ></div>
    <div id="tag-filters" class="filter-container"></div>

    <main>
      <div id="kanban-view" class="board">
        <div class="column" id="col-TODO">
          <div class="column-header">TODO</div>
          <div
            class="card-list"
            id="list-TODO"
            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event, 'TODO')"
          ></div>
        </div>
        <div class="column" id="col-IN-PROGRESS">
          <div class="column-header">IN PROGRESS</div>
          <div
            class="card-list"
            id="list-IN-PROGRESS"
            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event, 'IN PROGRESS')"
          ></div>
        </div>
        <div class="column" id="col-DONE">
          <div class="column-header">DONE</div>
          <div
            class="card-list"
            id="list-DONE"
            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event, 'DONE')"
          ></div>
        </div>
      </div>

      <div id="table-view" class="hidden">
        <table class="table-view">
          <thead>
            <tr>
              <th>File</th>
              <th>Epic</th>
              <th>Status</th>
              <th>Tags</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </main>

    <div id="modal-container" class="hidden">
      <div class="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-header">
            <div id="modal-epic" class="card-epic" style="margin: 0"></div>
            <div style="display: flex; gap: 0.5rem; align-items: center">
              <span
                id="save-indicator"
                class="status"
                style="margin-right: 1rem"
              ></span>
              <button class="btn" onclick="closeModal()">close()</button>
            </div>
          </div>
          <div class="modal-tabs">
            <div class="modal-tab" id="tab-edit" onclick="switchTab('edit')">
              EDIT
            </div>
            <div
              class="modal-tab active"
              id="tab-preview"
              onclick="switchTab('preview')"
            >
              PREVIEW
            </div>
          </div>
          <div class="modal-content">
            <div id="editor-pane" class="editor-area">
              <textarea
                id="markdown-editor"
                spellcheck="false"
                oninput="handleEdit()"
              ></textarea>
            </div>
            <div id="modal-body" class="prose"></div>
          </div>
          <div class="modal-footer">
            <div id="modal-tags-list" class="modal-tags"></div>
            <div class="tag-input-container">
              <input
                type="text"
                id="tag-add-input"
                class="tag-input"
                placeholder="add_tag..."
                onkeydown="if (event.key === 'Enter') addTag(this.value);"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let state = {
        tasks: [],
        view: "kanban",
        activeTask: null,
        activeTab: "preview",
        saveTimeout: null,
        activeTags: new Set(),
        activeEpics: new Set(),
      };

      const render = () => {
        renderFilters();
        const kanbanView = document.getElementById("kanban-view");
        const tableView = document.getElementById("table-view");

        if (state.view === "kanban") {
          kanbanView.classList.remove("hidden");
          tableView.classList.add("hidden");
          renderKanban();
        } else {
          kanbanView.classList.add("hidden");
          tableView.classList.remove("hidden");
          renderTable();
        }
      };

      const renderKanban = () => {
        const statuses = ["TODO", "IN PROGRESS", "DONE", "CONFLICT"];
        const container = document.getElementById("kanban-view");

        statuses.forEach((status) => {
          const listId = `list-${status.replace(" ", "-")}`;
          let list = document.getElementById(listId);
          if (!list) {
            if (status === "CONFLICT") {
              const conflictTasks = state.tasks.filter(
                (t) => t.status === "CONFLICT",
              );
              if (conflictTasks.length > 0) {
                const col = document.createElement("div");
                col.className = "column";
                col.id = "col-CONFLICT";
                col.innerHTML = `<div class="column-header">CONFLICT</div><div class="card-list" id="${listId}" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${status}')"></div>`;
                container.appendChild(col);
                list = document.getElementById(listId);
              } else return;
            } else {
              const col = document.getElementById(
                `col-${status.replace(" ", "-")}`,
              );
              if (col) {
                list = col.querySelector(".card-list");
                if (list) {
                  list.setAttribute("ondragover", "handleDragOver(event)");
                  list.setAttribute("ondragleave", "handleDragLeave(event)");
                  list.setAttribute("ondrop", `handleDrop(event, '${status}')`);
                }
              }
              if (!list) return;
            }
          }
          const tasks = state.tasks.filter((t) => {
            const statusMatch = t.status === status;
            if (!statusMatch) return false;
            return isTaskVisible(t);
          });
          list.innerHTML = tasks
            .map(
              (t) => `
                    <div class="card ${t.status === "CONFLICT" ? "conflict" : ""}" 
                         onclick="openCard('${t.file}')" 
                         draggable="true" 
                         ondragstart="handleDragStart(event, '${t.file}')">
                        <div class="card-epic">${t.status === "CONFLICT" ? "!!! GIT CONFLICT" : t.epic || "NO EPIC"}</div>
                        <div class="card-title">${t.title}</div>
                        <div class="card-tags">
                            ${(t.tags || []).map((tag) => `<span class="tag">${tag}</span>`).join("")}
                        </div>
                    </div>
                `,
            )
            .join("");
        });
      };

      const isTaskVisible = (t) => {
        const epicMatch =
          state.activeEpics.size === 0 ||
          state.activeEpics.has(t.epic || "NO EPIC");
        const tagMatch =
          state.activeTags.size === 0 ||
          (t.tags || []).some((tag) => state.activeTags.has(tag));
        return epicMatch && tagMatch;
      };

      let draggedFile = null;

      const handleDragStart = (e, file) => {
        draggedFile = file;
        e.dataTransfer.effectAllowed = "move";
      };

      const handleDragOver = (e) => {
        e.preventDefault();
        e.currentTarget.classList.add("drag-over");
      };

      const handleDragLeave = (e) => {
        e.currentTarget.classList.remove("drag-over");
      };

      const handleDrop = async (e, newStatus) => {
        e.preventDefault();
        e.currentTarget.classList.remove("drag-over");
        if (!draggedFile) return;

        try {
          await fetch("/api/update", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              file: draggedFile,
              status: newStatus,
            }),
          });
        } catch (err) {
          console.error(err);
        }
        draggedFile = null;
      };

      const openCard = (file) => {
        const task = state.tasks.find((t) => t.file === file);
        if (!task) return;
        state.activeTask = task;

        document.getElementById("modal-epic").innerText =
          task.epic || "NO EPIC";
        document.getElementById("markdown-editor").value = task.content || "";
        document.getElementById("modal-body").innerHTML = renderMarkdown(
          task.content,
        );

        renderModalTags();
        switchTab("preview");
        document.getElementById("modal-container").classList.remove("hidden");
      };

      const renderModalTags = () => {
        const list = document.getElementById("modal-tags-list");
        const tags = state.activeTask.tags || [];
        list.innerHTML = tags
          .map(
            (tag) => `
                <span class="tag">
                    ${tag}
                    <span class="tag-remove" onclick="removeTag('${tag}')">×</span>
                </span>
            `,
          )
          .join("");
      };

      const addTag = (tag) => {
        if (!tag || !state.activeTask) return;
        tag = tag.trim().toLowerCase();
        if (!state.activeTask.tags) state.activeTask.tags = [];
        if (!state.activeTask.tags.includes(tag)) {
          state.activeTask.tags.push(tag);
          renderModalTags();
          saveChanges();
        }
        document.getElementById("tag-add-input").value = "";
      };

      const removeTag = (tag) => {
        if (!state.activeTask || !state.activeTask.tags) return;
        state.activeTask.tags = state.activeTask.tags.filter((t) => t !== tag);
        renderModalTags();
        saveChanges();
      };

      const switchTab = (tab) => {
        state.activeTab = tab;
        const editTab = document.getElementById("tab-edit");
        const previewTab = document.getElementById("tab-preview");
        const editorPane = document.getElementById("editor-pane");
        const previewPane = document.getElementById("modal-body");

        if (tab === "edit") {
          editTab.classList.add("active");
          previewTab.classList.remove("active");
          editorPane.style.display = "flex";
          previewPane.classList.remove("active");
        } else {
          editTab.classList.remove("active");
          previewTab.classList.add("active");
          editorPane.style.display = "none";
          previewPane.classList.add("active");
          previewPane.innerHTML = renderMarkdown(
            document.getElementById("markdown-editor").value,
          );
        }
      };

      const handleEdit = () => {
        showSaveStatus("typing...");
        clearTimeout(state.saveTimeout);
        state.saveTimeout = setTimeout(saveChanges, 1000);
      };

      const saveChanges = async () => {
        if (!state.activeTask) return;
        const content = document.getElementById("markdown-editor").value;

        showSaveStatus("saving...");
        try {
          await fetch("/api/update", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              file: state.activeTask.file,
              content: content,
              tags: state.activeTask.tags,
            }),
          });
          showSaveStatus("saved");
          setTimeout(() => {
            if (document.getElementById("save-indicator").innerText === "saved")
              showSaveStatus("");
          }, 2000);
        } catch (err) {
          console.error(err);
          showSaveStatus("error");
        }
      };

      const showSaveStatus = (msg) => {
        document.getElementById("save-indicator").innerText = msg;
      };

      const closeModal = () => {
        if (state.saveTimeout) {
          clearTimeout(state.saveTimeout);
          saveChanges();
        }
        document.getElementById("modal-container").classList.add("hidden");
        state.activeTask = null;
      };

      const renderMarkdown = (md) => {
        if (!md) return "";
        // 1. Pre-process: Handle Tables first
        // This regex looks for a header row, a separator row, and subsequent body rows
        md = md.replace(/^\|(.+)\|\n(?:\|[\s\-\|]+\|)\n((?:\|.+\|\n?)*)/gim, (match, header, body) => {
            const parseRow = (row) => row.split('|')
                .filter(cell => cell.trim() !== '')
                .map(cell => `<td>${cell.trim()}</td>`)
                .join('');

            const headerRow = `<tr>${parseRow(header).replace(/td>/g, 'th>')}</tr>`;
            const bodyRows = body.trim().split('\n').map(row => `<tr>${parseRow(row)}</tr>`).join('');

            return `<table><thead>${headerRow}</thead><tbody>${bodyRows}</tbody></table>`;
        });
        return (
          md
            // This looks for triple backticks and wraps the content in <pre><code>
            .replace(/```(?:[a-z]+)?\n([\s\S]*?)\n```/g, '<pre><code>$1</code></pre>')
            // 2. Block Elements
            .replace(/^##### (.*$)/gim, "<h5>$1</h5>")
            .replace(/^#### (.*$)/gim, "<h4>$1</h4>")
            .replace(/^### (.*$)/gim, "<h3>$1</h3>")
            .replace(/^## (.*$)/gim, "<h2>$1</h2>")
            .replace(/^# (.*$)/gim, "<h1>$1</h1>")
            .replace(/^> (.*$)/gim, "<blockquote>$1</blockquote>")

            // 3. Lists (Unordered)
            .replace(/^\s*[\-\*] (.*$)/gim, "<ul><li>$1</li></ul>")
            .replace(/<\/ul>\s*<ul>/gim, "") // Merges consecutive list items

            // 4. Inline Elements
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>") // Bold
            .replace(/\b_(\S(.*?)\S)_\b/g, '<u>$1</u>') // Underline
            .replace(/\*(.*?)\*/g, "<em>$1</em>") // Italics
            .replace(/`(.*?)`/g, "<code>$1</code>") // Inline code
            .replace(/~~(.*?)~~/g, "<del>$1</del>") // Strikethrough

            // 5. Links [text](url)
            .replace(
              /\[([^\]]+)\]\(([^\)]+)\)/g,
              '<a href="$2" target="_blank">$1</a>',
            )
            .trim()
        );
      };

      const renderTable = () => {
        const body = document.getElementById("table-body");
        const tasks = state.tasks.filter(isTaskVisible);
        body.innerHTML = tasks
          .map(
            (t) => `
                <tr onclick="openCard('${t.file}')" style="cursor:pointer">
                    <td>${t.file}</td>
                    <td>${t.epic || "-"}</td>
                    <td>${t.status}</td>
                    <td>${(t.tags || []).join(", ")}</td>
                </tr>
            `,
          )
          .join("");
      };

      const renderFilters = () => {
        const epicContainer = document.getElementById("epic-filters");
        const tagContainer = document.getElementById("tag-filters");
        const allEpics = new Set();
        const allTags = new Set();

        state.tasks.forEach((t) => {
          allEpics.add(t.epic || "NO EPIC");
          (t.tags || []).forEach((tag) => allTags.add(tag));
        });

        epicContainer.innerHTML =
          allEpics.size > 0
            ? '<span class="filter-label">EPICS:</span>' +
              Array.from(allEpics)
                .sort()
                .map(
                  (epic) => `
                    <div class="filter-chip ${state.activeEpics.has(epic) ? "active" : ""}" onclick="toggleEpicFilter('${epic}')">
                        ${epic}
                    </div>
                `,
                )
                .join("")
            : "";

        tagContainer.innerHTML =
          allTags.size > 0
            ? '<span class="filter-label">TAGS:</span>' +
              Array.from(allTags)
                .sort()
                .map(
                  (tag) => `
                    <div class="filter-chip ${state.activeTags.has(tag) ? "active" : ""}" onclick="toggleTagFilter('${tag}')">
                        ${tag}
                    </div>
                `,
                )
                .join("")
            : "";
      };

      const toggleEpicFilter = (epic) => {
        if (state.activeEpics.has(epic)) state.activeEpics.delete(epic);
        else state.activeEpics.add(epic);
        render();
      };

      const toggleTagFilter = (tag) => {
        if (state.activeTags.has(tag)) state.activeTags.delete(tag);
        else state.activeTags.add(tag);
        render();
      };

      const toggleView = () => {
        state.view = state.view === "kanban" ? "table" : "kanban";
        render();
      };

      const toggleTheme = () => {
        document.body.classList.toggle("dark");
      };

      const fetchBoard = async () => {
        try {
          const res = await fetch("/api/board");
          const data = await res.json();
          state.tasks = data;
          render();
          showStatus("synced");
        } catch (err) {
          console.error(err);
          showStatus("error");
        }
      };

      const showStatus = (msg) => {
        const status = document.getElementById("sync-status");
        status.classList.remove("syncing", "error");

        if (msg === "error") {
          status.innerText = "SERVER DISCONNECTED";
          status.classList.add("error");
        } else {
          status.innerText = msg;
          if (msg === "syncing") status.classList.add("syncing");
        }
      };

      const evtSource = new EventSource("/api/events");
      evtSource.onmessage = (event) => {
        if (event.data === "update") {
          showStatus("syncing");
          fetchBoard();
        }
      };
      evtSource.onerror = () => {
        showStatus("error");
      };

      window.addEventListener("keydown", (e) => {
        if (
          e.key === "Escape" &&
          !document
            .getElementById("modal-container")
            .classList.contains("hidden")
        ) {
          closeModal();
        }
      });

      fetchBoard();
    </script>
  </body>
</html>
